# docker-compose.test.yml
# Test environment — ephemeral, used by CI and local integration tests.
# Optimized for speed: fsync/synchronous_commit OFF (never use in prod/staging).
# DB volumes are removed on stop (down -v).
#
# Start:  ./scripts/env-manager.sh start test
# Stop:   ./scripts/env-manager.sh stop test   (removes volumes)
# Reset:  ./scripts/reset-test-db.sh
#
# Ports (localhost only):
#   API:      http://localhost:8200
#   DB:       localhost:5434
#   Mock LLM: http://localhost:8300

networks:
  engramia-test-net:
    driver: bridge

services:
  engramia-api-test:
    image: ghcr.io/engramia/engramia:${IMAGE_TAG:?IMAGE_TAG must be set}
    container_name: engramia-api-test
    ports:
      - "127.0.0.1:8200:8000"
    env_file: .env.test
    networks:
      - engramia-test-net
    restart: "no"
    depends_on:
      pgvector-test:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -o /dev/null -w '%{http_code}' http://localhost:8000/v1/health | grep -qE '^(200|401)$'"]
      interval: 10s
      timeout: 5s
      retries: 6
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
      - /app/tmp:mode=1777,size=32m
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "1"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

  pgvector-test:
    image: pgvector/pgvector:0.7.4-pg16
    container_name: engramia-pgvector-test
    ports:
      - "127.0.0.1:5434:5432"
    environment:
      POSTGRES_USER: engramia_test
      POSTGRES_PASSWORD: test_password_local_only
      POSTGRES_DB: engramia_test
    command: >
      postgres
      -c shared_buffers=32MB
      -c effective_cache_size=64MB
      -c work_mem=4MB
      -c max_connections=20
      -c fsync=off
      -c synchronous_commit=off
      -c full_page_writes=off
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - engramia-test-net
    restart: "no"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engramia_test"]
      interval: 5s
      timeout: 3s
      retries: 10
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "1"
    deploy:
      resources:
        limits:
          cpus: "0.3"
          memory: 256M

  mock-llm:
    build: ./mock-llm
    image: engramia/mock-llm:latest
    container_name: engramia-mock-llm
    ports:
      - "127.0.0.1:8300:8000"
    networks:
      - engramia-test-net
    restart: "no"
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "1"
    deploy:
      resources:
        limits:
          cpus: "0.15"
          memory: 96M

# No named volumes — test DB runs on tmpfs, wiped on every down -v
