global:
  smtp_smarthost: "smtp.example.com:587"       # CHANGE: your SMTP server
  smtp_from: "monitoring@engramia.dev"          # CHANGE: sender address
  smtp_auth_username: "monitoring@engramia.dev" # CHANGE: SMTP user
  smtp_auth_password: "smtp-password-here"      # CHANGE: SMTP password
  smtp_require_tls: true

route:
  group_by: ["alertname", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "email-default"

  routes:
    - match:
        severity: critical
      receiver: "email-critical"
      repeat_interval: 1h

receivers:
  - name: "email-default"
    email_configs:
      - to: "ops@engramia.dev"        # CHANGE: your email
        send_resolved: true
        headers:
          Subject: '{{ template "email.default.subject" . }}'

  - name: "email-critical"
    email_configs:
      - to: "ops@engramia.dev"        # CHANGE: your email
        send_resolved: true
        headers:
          Subject: "[CRITICAL] {{ .GroupLabels.alertname }}"

inhibit_rules:
  - source_match:
      severity: "critical"
    target_match:
      severity: "warning"
    equal: ["alertname"]
