global:
  scrape_interval: 30s       # Low traffic — no need for 15s default
  evaluation_interval: 30s
  scrape_timeout: 10s

rule_files:
  - alerts.rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "engramia-api"
    metrics_path: /metrics/
    scrape_interval: 30s
    authorization:
      type: Bearer
      credentials: "${ENGRAMIA_METRICS_TOKEN}"
    static_configs:
      - targets: ["engramia-api:8000"]
        labels:
          instance: "engramia-prod"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "node"
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          instance: "engramia-prod"

  - job_name: "engramia-api-staging"
    metrics_path: /metrics/
    scrape_interval: 30s
    scheme: https
    tls_config:
      insecure_skip_verify: false
    authorization:
      type: Bearer
      credentials: "${ENGRAMIA_METRICS_TOKEN}"
    static_configs:
      - targets: ["staging-api.engramia.dev:443"]
        labels:
          instance: "engramia-staging"
