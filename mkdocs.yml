site_name: Engramia
site_description: Self-learning memory layer for AI agent frameworks
site_url: https://engramia.readthedocs.io
repo_url: https://github.com/engramia/engramia
repo_name: engramia/engramia
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - User Guide: user-guide.md
  - Concepts & Architecture: concepts.md
  - Pricing: pricing.md
  - API:
      - Python API Reference: api-reference.md
      - REST API: rest-api.md
      - API Stability: api-stability.md
      - API Versioning: api-versioning.md
  - CLI: cli.md
  - Providers: providers.md
  - Integrations:
      - Overview & Examples: integrations/examples.md
      - LangChain: integrations/langchain.md
      - CrewAI: integrations/crewai.md
      - Anthropic Agents: integrations/anthropic-agents.md
      - OpenAI Agents: integrations/openai-agents.md
      - AutoGen: integrations/autogen.md
      - PydanticAI: integrations/pydantic-ai.md
      - MCP Server: integrations/mcp.md
      - Webhook SDK: integrations/webhook.md
  - Administration:
      - Admin Guide: admin-guide.md
      - Environment Variables: environment-variables.md
      - Monitoring: monitoring.md
      - ROI Calibration: roi-calibration.md
  - Deployment & Operations:
      - Deployment: deployment.md
      - Production Hardening: production-hardening.md
      - Backup & Restore: backup-restore.md
      - Disaster Recovery: disaster-recovery.md
      - Data Handling: data-handling.md
      - Embedding Reindex: embedding-reindex.md
      - HNSW Maintenance: hnsw-maintenance.md
  - Security:
      - Overview: security.md
      - Security Architecture: security-architecture.md
      - SOC 2 Controls: soc2-controls.md
      - Incident Response: incident-response-plan.md
  - Architecture:
      - Admin Dashboard: architecture/admin-dashboard.md
  - Runbooks:
      - Overview: runbooks/README.md
      - Deploy Checklist: runbooks/deploy-checklist.md
      - Deploy Rollback: runbooks/deploy-rollback.md
      - API Key Rotation: runbooks/api-key-rotation.md
      - Certificate Renewal: runbooks/certificate-renewal.md
      - Database Recovery: runbooks/database-recovery.md
      - Disk Full: runbooks/disk-full.md
      - High Error Rates: runbooks/high-error-rates.md
      - High Latency: runbooks/high-latency.md
      - Job Queue Issues: runbooks/job-queue-issues.md
      - LLM Provider Outage: runbooks/llm-provider-outage.md
      - Maintenance Mode: runbooks/maintenance-mode.md
      - Rate Limit Tuning: runbooks/rate-limit-tuning.md
  - Legal:
      - Terms of Service: legal/TERMS_OF_SERVICE.md
      - Acceptable Use Policy: legal/ACCEPTABLE_USE_POLICY.md
      - Privacy Policy: legal/PRIVACY_POLICY.md
      - Cookie Policy: legal/COOKIE_POLICY.md
      - DPA Template: legal/DPA_TEMPLATE.md
      - Commercial License: legal/COMMERCIAL_LICENSE_TEMPLATE.md
      - Sub-processors: legal/SUBPROCESSORS.md
      - Dependency Licenses: legal/DEPENDENCY_LICENSES.md
      - Processing Activities (ROPA): legal/ROPA.md

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/engramia/engramia
