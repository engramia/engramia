# docker-compose.staging.yml
# Staging environment — mirrors production with reduced resource limits.
# Start:  ./scripts/env-manager.sh start staging
# Stop:   ./scripts/env-manager.sh stop staging
# Status: ./scripts/env-manager.sh status staging
#
# Ports (localhost only):
#   API:       http://localhost:8100
#   Dashboard: http://localhost:3100
#   DB:        localhost:5433
#
# Requires: .env.staging, IMAGE_TAG env var

networks:
  engramia-staging-net:
    driver: bridge

services:
  caddy-staging:
    image: caddy:2.9.1-alpine
    container_name: engramia-caddy-staging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.non-prod:/etc/caddy/Caddyfile:ro
      - caddy_staging_data:/data
      - caddy_staging_config:/config
    networks:
      - engramia-staging-net
    restart: unless-stopped
    depends_on:
      - engramia-api-staging
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
        reservations:
          memory: 32M

  dashboard-staging:
    image: ghcr.io/engramia/dashboard:${IMAGE_TAG:?IMAGE_TAG must be set}
    container_name: engramia-dashboard-staging
    ports:
      - "127.0.0.1:3100:3000"
    restart: unless-stopped
    environment:
      - NEXTAUTH_URL=${STAGING_DASHBOARD_URL:-https://staging-app.engramia.dev}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXT_PUBLIC_API_URL=${STAGING_API_URL:-https://staging-api.engramia.dev}
    networks:
      - engramia-staging-net
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: 256M
        reservations:
          memory: 128M

  engramia-api-staging:
    image: ghcr.io/engramia/engramia:${IMAGE_TAG:?IMAGE_TAG must be set}
    container_name: engramia-api-staging
    ports:
      - "127.0.0.1:8100:8000"
    env_file: .env.staging
    volumes:
      - engramia_staging_data:/data
    networks:
      - engramia-staging-net
    restart: unless-stopped
    depends_on:
      pgvector-staging:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf -o /dev/null -w '%{http_code}' http://localhost:8000/v1/health | grep -qE '^(200|401)$'"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
      - /app/tmp:mode=1777,size=32m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 384M
        reservations:
          memory: 192M

  pgvector-staging:
    image: pgvector/pgvector:0.7.4-pg16
    container_name: engramia-pgvector-staging
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_USER: engramia_staging
      POSTGRES_PASSWORD: ${STAGING_POSTGRES_PASSWORD:?STAGING_POSTGRES_PASSWORD must be set}
      POSTGRES_DB: engramia_staging
    command: >
      postgres
      -c shared_buffers=64MB
      -c effective_cache_size=128MB
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c max_connections=30
      -c log_min_duration_statement=200
    volumes:
      - pgdata_staging:/var/lib/postgresql/data
    networks:
      - engramia-staging-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engramia_staging"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: 384M
        reservations:
          memory: 128M

volumes:
  engramia_staging_data:
  caddy_staging_data:
  caddy_staging_config:
  pgdata_staging:
