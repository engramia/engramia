# docker-compose.monitoring.yml
# Deploy alongside prod:
#   docker compose -f docker-compose.prod.yml -f docker-compose.monitoring.yml up -d
# Or standalone (after prod is up):
#   COMPOSE_PROJECT_NAME=agent-brain docker compose -f docker-compose.monitoring.yml up -d

networks:
  engramia-net:
    external: true        # Created by docker-compose.prod.yml
  monitoring:
    driver: bridge

services:
  # ---------- Prometheus ----------
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=90d"
      - "--storage.tsdb.retention.size=1GB"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts.rules.yml:/etc/prometheus/alerts.rules.yml:ro
      - prometheus_data:/prometheus
    networks:
      - engramia-net
      - monitoring
    ports:
      - "127.0.0.1:9090:9090"
    restart: unless-stopped
    mem_limit: 256m

  # ---------- Alertmanager ----------
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: alertmanager
    command:
      - "--config.file=/etc/alertmanager/alertmanager.yml"
      - "--storage.path=/alertmanager"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    networks:
      - monitoring
    ports:
      - "127.0.0.1:9093:9093"
    restart: unless-stopped
    mem_limit: 64m

  # ---------- Loki ----------
  loki:
    image: grafana/loki:3.1.0
    container_name: loki
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./monitoring/loki.yml:/etc/loki/loki.yml:ro
      - loki_data:/loki
    networks:
      - monitoring
    ports:
      - "127.0.0.1:3100:3100"
    restart: unless-stopped
    mem_limit: 256m

  # ---------- Promtail ----------
  promtail:
    image: grafana/promtail:3.1.0
    container_name: promtail
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./monitoring/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail_positions:/tmp
    networks:
      - monitoring
    restart: unless-stopped
    mem_limit: 64m

  # ---------- Grafana ----------
  grafana:
    image: grafana/grafana-oss:11.1.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_SERVER_ROOT_URL: ${GRAFANA_ROOT_URL:-https://grafana.engramia.dev}
      GF_SMTP_ENABLED: "true"
      GF_SMTP_HOST: ${SMTP_HOST}:${SMTP_PORT:-587}
      GF_SMTP_USER: ${SMTP_USER}
      GF_SMTP_PASSWORD: ${SMTP_PASSWORD}
      GF_SMTP_FROM_ADDRESS: ${SMTP_FROM:-monitoring@engramia.dev}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - engramia-net
      - monitoring
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped
    mem_limit: 192m

  # ---------- Uptime Kuma ----------
  uptime-kuma:
    image: louislam/uptime-kuma:2
    container_name: uptime-kuma
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - engramia-net
      - monitoring
    ports:
      - "127.0.0.1:3001:3001"
    restart: unless-stopped
    mem_limit: 128m

volumes:
  prometheus_data:
  alertmanager_data:
  loki_data:
  grafana_data:
  uptime_kuma_data:
  promtail_positions:
