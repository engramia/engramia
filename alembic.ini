# Alembic configuration for Remanence
# Override sqlalchemy.url via REMANENCE_DATABASE_URL env var (recommended).

[alembic]
script_location = remanence/db/migrations
prepend_sys_path = .
# sqlalchemy.url is overridden at runtime from REMANENCE_DATABASE_URL env var
sqlalchemy.url = postgresql://remanence:remanence@localhost:5432/remanence

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
