# Alembic configuration for Engramia
# Override sqlalchemy.url via ENGRAMIA_DATABASE_URL env var (recommended).

[alembic]
script_location = engramia/db/migrations
prepend_sys_path = .
# sqlalchemy.url is overridden at runtime from ENGRAMIA_DATABASE_URL env var
sqlalchemy.url = postgresql://engramia:engramia@localhost:5432/engramia

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
