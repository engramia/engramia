name: Security Scan

# Scoped triggers so pure-docs/workflow/frontend PRs don't pay for full
# Python scans. Weekly cron guarantees baseline coverage regardless.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    paths:
      - 'engramia/**'
      - 'pyproject.toml'
      - 'Dockerfile'
      - '.github/workflows/security.yml'
  schedule:
    # Run weekly on Monday at 08:00 UTC even without new commits
    - cron: "0 8 * * 1"

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  pip-audit:
    name: pip-audit (Python dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pip-audit and project deps
        run: |
          pip install pip-audit
          pip install -e ".[all]" --quiet
      - name: Run pip-audit
        # GHSA-pjjw-68hj-v9mw: uv <0.11.6 — transitive build-tool dep, not used at runtime.
        # No runtime impact; cannot be upgraded without bumping build toolchain.
        run: pip-audit --skip-editable --ignore-vuln GHSA-pjjw-68hj-v9mw

  bandit:
    name: bandit (Python static security analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run bandit
        # -c pyproject.toml picks up [tool.bandit] exclude_dirs (tests,
        # migrations) and skips (B101: assert-in-dev-guards).
        run: |
          bandit -r engramia/ -c pyproject.toml \
            --severity-level medium --confidence-level medium \
            -f json -o bandit-report.json || true
          bandit -r engramia/ -c pyproject.toml \
            --severity-level medium --confidence-level medium
      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json
          if-no-files-found: ignore
          retention-days: 30

  trufflehog:
    name: trufflehog (secret scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history required for diff-based scan
      - name: Run trufflehog
        uses: trufflesecurity/trufflehog@v3.94.3
        with:
          extra_args: --only-verified

  trivy:
    name: Trivy (Docker image CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build Docker image for scanning
        run: |
          docker build -t engramia-scan:${{ github.sha }} .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: engramia-scan:${{ github.sha }}
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true
