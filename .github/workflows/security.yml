name: Security Scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly on Monday at 08:00 UTC even without new commits
    - cron: "0 8 * * 1"

jobs:
  pip-audit:
    name: pip-audit (Python dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pip-audit and project deps
        run: |
          pip install pip-audit
          pip install -e ".[all]" --quiet
      - name: Run pip-audit
        # GHSA-pjjw-68hj-v9mw: uv <0.11.6 — transitive build-tool dep, not used at runtime.
        # No runtime impact; cannot be upgraded without bumping build toolchain.
        run: pip-audit --skip-editable --ignore-vuln GHSA-pjjw-68hj-v9mw

  bandit:
    name: bandit (Python static security analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run bandit
        run: |
          bandit -r engramia/ \
            --severity-level medium \
            --confidence-level medium \
            --exclude engramia/db/migrations \
            -f json -o bandit-report.json || true
          bandit -r engramia/ \
            --severity-level medium \
            --confidence-level medium \
            --exclude engramia/db/migrations
      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: bandit-report
          path: bandit-report.json
          if-no-files-found: ignore

  trivy:
    name: Trivy (Docker image CVE scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build Docker image for scanning
        run: |
          docker build -t engramia-scan:${{ github.sha }} .
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: engramia-scan:${{ github.sha }}
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true
