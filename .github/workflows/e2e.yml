name: E2E

# Runs Playwright dashboard tests. Expensive (~20–25 min per run) so we
# limit triggers to:
#   - pull_request: only when dashboard/api/e2e code actually changes
#   - schedule:     daily baseline at 04:00 UTC on main
#   - workflow_dispatch: manual trigger for pre-merge verification
#
# To run manually: GitHub Actions → E2E → "Run workflow".

on:
  pull_request:
    branches: [main]
    paths:
      - 'dashboard/**'
      - 'engramia/api/**'
      - 'e2e/**'
      - '.github/workflows/e2e.yml'
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch: {}

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -e ".[dev,openai,api,cli]"

      - name: Start API server (background)
        # No OPENAI_API_KEY in CI — disable OpenAI-backed providers so the
        # module-level `app = create_app()` at engramia/api/app.py:605 does
        # not crash on import when OpenAIEmbeddings/OpenAIProvider try to
        # instantiate an OpenAI client without credentials.
        run: uvicorn engramia.api.app:app --host 127.0.0.1 --port 8000 &
        env:
          ENGRAMIA_AUTH_MODE: dev
          ENGRAMIA_STORAGE: json
          ENGRAMIA_ALLOW_NO_AUTH: "true"
          ENGRAMIA_DATA_PATH: /tmp/engramia-e2e
          ENGRAMIA_EMBEDDING_MODEL: none
          ENGRAMIA_LLM_PROVIDER: none

      - name: Install dashboard dependencies
        run: npm ci
        working-directory: dashboard

      - name: Build dashboard
        run: npm run build
        working-directory: dashboard
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000

      - name: Start dashboard preview (background)
        run: npm run start -- --port 3000 &
        working-directory: dashboard

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/v1/health; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "::error::API did not become healthy within 60s" >&2
          exit 1

      - name: Wait for dashboard to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000; then
              echo "Dashboard is ready"
              exit 0
            fi
            echo "Waiting for dashboard... ($i/30)"
            sleep 2
          done
          echo "::error::Dashboard did not start within 60s" >&2
          exit 1

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install chromium --with-deps
        working-directory: e2e

      - name: Install E2E dependencies
        run: npm ci
        working-directory: e2e

      - name: Run Playwright E2E tests (dashboard)
        # DASHBOARD_API_KEY must be non-empty so the auth fixture injects a
        # truthy token into localStorage. The API is in dev mode with
        # ENGRAMIA_ALLOW_NO_AUTH=true so any non-empty token is accepted.
        run: npx playwright test --project=dashboard
        working-directory: e2e
        env:
          DASHBOARD_URL: http://localhost:3000
          DASHBOARD_API_URL: http://127.0.0.1:8000
          DASHBOARD_API_KEY: e2e-dev-token
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
