name: Deploy to Production

# Manual trigger — run after staging smoke tests pass.
# TODO (post public launch): replace with GitHub environment "production"
# Required reviewers gate (Settings → Environments → production → Required reviewers).
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g. v0.6.5)"
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  # ── 1. Deploy to production ─────────────────────────────────────────────────
  deploy-prod:
    name: Deploy to production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build docs site
        run: |
          pip install mkdocs-material
          mkdocs build -d docs-site

      - name: Copy compose files and docs to VM
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile,docs-site"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            export IMAGE_TAG=$(echo "${{ inputs.image_tag }}" | sed 's/^v//')
            cd ${{ secrets.DEPLOY_PATH }}
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml pull engramia-api
            IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml up -d pgvector
            IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml run --rm -T engramia-api alembic upgrade head
            IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml up -d engramia-api caddy
            docker image prune -f

  # ── 2. Smoke test production ────────────────────────────────────────────────
  smoke-test-prod:
    name: Smoke test production
    runs-on: ubuntu-latest
    needs: deploy-prod
    steps:
      - name: Wait for prod to stabilize
        run: sleep 15

      - name: Version check
        run: |
          EXPECTED=$(echo "${{ inputs.image_tag }}" | sed 's/^v//')
          RESP=$(curl -sf --max-time 10 https://api.engramia.dev/v1/version || echo "")
          if [ -z "$RESP" ]; then
            echo "WARNING: /v1/version not available (older image) — skipping version check"
          else
            echo "version_response=$RESP"
            ACTUAL=$(echo "$RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('app_version','unknown'))" 2>/dev/null || echo "unknown")
            echo "expected=$EXPECTED  actual=$ACTUAL"
            [ "$EXPECTED" = "$ACTUAL" ] || (echo "POST-DEPLOY VERSION MISMATCH" && exit 1)
          fi

      - name: Health check
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.PROD_API_KEY }}" \
            https://api.engramia.dev/v1/health)
          echo "prod_health_status=$STATUS"
          [ "$STATUS" = "200" ] || (echo "PROD HEALTH CHECK FAILED (status=$STATUS)" && exit 1)

      - name: Deep health check
        run: |
          RESP=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.PROD_API_KEY }}" \
            https://api.engramia.dev/v1/health/deep)
          STATUS=$(echo "$RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          echo "prod_deep_health_status=$STATUS"
          [ "$STATUS" != "error" ] || (echo "PROD DEEP HEALTH RETURNED error: $RESP" && exit 1)
