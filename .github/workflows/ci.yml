name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,openai,api,cli,postgres,billing,cloud-auth]"

      - name: Lint (ruff)
        run: ruff check engramia/

      - name: Format check (ruff)
        run: ruff format --check engramia/

      - name: Type check (mypy)
        run: mypy engramia/ --ignore-missing-imports

      - name: Tests
        run: pytest --cov=engramia --cov-report=xml --cov-fail-under=80 --junitxml=test-results.xml
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v5
        if: always()
        with:
          name: test-results
          path: test-results.xml

  version-consistency:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # required for hatch-vcs to read tags

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install with hatch-vcs
        run: pip install hatch-vcs ".[dev,api]"

      - name: hatch-vcs smoke (hatchling can resolve version)
        run: python -m hatchling version

      - name: No hardcoded version in __init__.py
        run: "! grep -E '^__version__ = \"[0-9]' engramia/__init__.py"

      - name: pyproject.toml uses dynamic version
        run: grep 'dynamic.*version' pyproject.toml

      - name: Build/runtime version parity (tagged commits only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=$(git describe --tags --abbrev=0 | sed 's/^v//')
          RUNTIME=$(python -c "import engramia; print(engramia.__version__)")
          echo "tag=$TAG  runtime=$RUNTIME"
          [ "$TAG" = "$RUNTIME" ] || (echo "VERSION DRIFT: tag=$TAG runtime=$RUNTIME" && exit 1)

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history for trufflehog

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,openai,api,cli]"

      - name: Dependency audit (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --desc --skip-editable

      - name: SAST (bandit)
        run: |
          pip install bandit
          bandit -r engramia/ -c pyproject.toml --severity-level medium --confidence-level medium -f json -o bandit-report.json || true
          bandit -r engramia/ -c pyproject.toml --severity-level high --confidence-level high
        continue-on-error: false

      - name: Upload SAST report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: bandit-report
          path: bandit-report.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Secret scanning (trufflehog)
        uses: trufflesecurity/trufflehog@v3.88.17
        with:
          extra_args: --only-verified
