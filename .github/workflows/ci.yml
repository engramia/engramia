name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,openai,api,cli]"

      - name: Lint (ruff)
        run: ruff check engramia/

      - name: Format check (ruff)
        run: ruff format --check engramia/

      - name: Type check (mypy)
        run: mypy engramia/ --ignore-missing-imports
        continue-on-error: true

      - name: Tests
        run: pytest --cov=engramia --cov-report=xml --cov-fail-under=80
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
