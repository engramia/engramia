name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,openai,api,cli,postgres,billing,cloud-auth]"

      - name: Lint (ruff)
        run: ruff check engramia/

      - name: Format check (ruff)
        run: ruff format --check engramia/

      - name: Type check (mypy)
        run: mypy engramia/ --ignore-missing-imports

      - name: Tests
        # Subset coverage (no postgres/embeddings) — full coverage enforced in test-full job
        run: pytest -m "not postgres and not local_embeddings and not concurrent" --cov=engramia --cov-report=xml --cov-fail-under=60 --junitxml=test-results.xml
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Upload coverage
        uses: codecov/codecov-action@v6
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: test-results
          path: test-results.xml

  test-full:
    name: Full Test Suite (with Postgres)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/staging'
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: engramia_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -e ".[dev,openai,api,cli,postgres]"
      - name: Run full test suite
        run: pytest --cov=engramia --cov-fail-under=80 --cov-report=xml --junitxml=test-results-full.xml
        env:
          ENGRAMIA_TEST_DB_URL: postgresql://postgres:test@localhost:5432/engramia_test
          ENGRAMIA_STORAGE: postgres
      - name: Upload full coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-full
          path: coverage.xml

  version-consistency:
    name: Version consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # required for hatch-vcs to read tags

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install with hatch-vcs
        run: pip install hatch-vcs ".[dev,api]"

      - name: hatch-vcs smoke (hatchling can resolve version)
        run: python -m hatchling version

      - name: No hardcoded version in __init__.py
        run: "! grep -E '^__version__ = \"[0-9]' engramia/__init__.py"

      - name: pyproject.toml uses dynamic version
        run: grep 'dynamic.*version' pyproject.toml

      - name: Build/runtime version parity (tagged commits only)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          TAG=$(git describe --tags --abbrev=0 | sed 's/^v//')
          RUNTIME=$(python -c "import engramia; print(engramia.__version__)")
          echo "tag=$TAG  runtime=$RUNTIME"
          [ "$TAG" = "$RUNTIME" ] || (echo "VERSION DRIFT: tag=$TAG runtime=$RUNTIME" && exit 1)

  e2e:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install -e ".[dev,openai,api,cli]"

      - name: Start API server (background)
        # No OPENAI_API_KEY in CI — disable OpenAI-backed providers so the
        # module-level `app = create_app()` at engramia/api/app.py:605 does
        # not crash on import when OpenAIEmbeddings/OpenAIProvider try to
        # instantiate an OpenAI client without credentials.
        run: uvicorn engramia.api.app:app --host 127.0.0.1 --port 8000 &
        env:
          ENGRAMIA_AUTH_MODE: dev
          ENGRAMIA_STORAGE: json
          ENGRAMIA_ALLOW_NO_AUTH: "true"
          ENGRAMIA_DATA_PATH: /tmp/engramia-e2e
          ENGRAMIA_EMBEDDING_MODEL: none
          ENGRAMIA_LLM_PROVIDER: none

      - name: Install dashboard dependencies
        run: npm ci
        working-directory: dashboard

      - name: Build dashboard
        run: npm run build
        working-directory: dashboard
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000

      - name: Start dashboard preview (background)
        run: npm run start -- --port 3000 &
        working-directory: dashboard

      - name: Wait for API to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8000/v1/health; then
              echo "API is ready"
              exit 0
            fi
            echo "Waiting for API... ($i/30)"
            sleep 2
          done
          echo "::error::API did not become healthy within 60s" >&2
          exit 1

      - name: Wait for dashboard to be ready
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000; then
              echo "Dashboard is ready"
              exit 0
            fi
            echo "Waiting for dashboard... ($i/30)"
            sleep 2
          done
          echo "::error::Dashboard did not start within 60s" >&2
          exit 1

      - name: Install Playwright browsers (chromium only)
        run: npx playwright install chromium --with-deps
        working-directory: e2e

      - name: Install E2E dependencies
        run: npm ci
        working-directory: e2e

      - name: Run Playwright E2E tests (dashboard)
        # DASHBOARD_API_KEY must be non-empty so the auth fixture injects a
        # truthy token into localStorage. The API is in dev mode with
        # ENGRAMIA_ALLOW_NO_AUTH=true so any non-empty token is accepted.
        # With token="", isAuthenticated is false and Shell renders null,
        # causing every dashboard test to timeout on missing elements.
        run: npx playwright test --project=dashboard
        working-directory: e2e
        env:
          DASHBOARD_URL: http://localhost:3000
          DASHBOARD_API_URL: http://127.0.0.1:8000
          DASHBOARD_API_KEY: e2e-dev-token
          CI: "true"

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0  # full history for trufflehog

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,openai,api,cli]"

      - name: Dependency audit (pip-audit)
        run: |
          pip install pip-audit
          # GHSA-pjjw-68hj-v9mw: uv <0.11.6 — transitive build-tool dep, not runtime.
          pip-audit --desc --skip-editable --ignore-vuln GHSA-pjjw-68hj-v9mw

      - name: SAST (bandit)
        run: |
          pip install bandit
          bandit -r engramia/ -c pyproject.toml --severity-level medium --confidence-level medium -f json -o bandit-report.json || true
          bandit -r engramia/ -c pyproject.toml --severity-level high --confidence-level high
        continue-on-error: false

      - name: Upload SAST report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-report
          path: bandit-report.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Secret scanning (trufflehog)
        uses: trufflesecurity/trufflehog@v3.94.3
        with:
          extra_args: --only-verified
