name: Backup Restore Test

# GTM launch blocker A12 — weekly automated backup restore validation.
#
# Runs on a fixed schedule and on demand.  The test:
#   1. Spins up two ephemeral pgvector containers.
#   2. Migrates and seeds the source DB, creates a pg_dump backup.
#   3. Restores the backup into the target DB.
#   4. Validates schema integrity, Alembic revision, and seed data presence.
#   5. Reports PASS / FAIL and uploads the run log as an artifact.
#
# On failure: a GitHub Actions job summary is posted with the error output
# so the on-call engineer can triage without downloading the artifact.

on:
  # Weekly on Sunday at 04:00 UTC (low-traffic window)
  schedule:
    - cron: "0 4 * * 0"

  # Manual trigger — allows re-running after an incident or config change
  workflow_dispatch:
    inputs:
      pgimage:
        description: "pgvector Docker image override (leave blank for default)"
        required: false
        default: ""

jobs:
  backup-restore-test:
    name: Backup Restore Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev,postgres]"

      - name: Verify Docker is available
        run: docker info

      - name: Run backup restore test
        id: brt
        env:
          # Allow the image to be overridden via workflow_dispatch input
          ENGRAMIA_BRT_PGIMAGE: ${{ inputs.pgimage || 'pgvector/pgvector:0.7.4-pg16' }}
        run: |
          python scripts/test_backup_restore.py 2>&1 | tee brt-output.log
          # Preserve the exit code through tee
          exit ${PIPESTATUS[0]}

      - name: Write job summary on failure
        if: failure() && steps.brt.outcome == 'failure'
        run: |
          echo "## :x: Backup Restore Test FAILED" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Run \`python scripts/test_backup_restore.py\` locally to reproduce." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "<details><summary>Full test output</summary>" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          tail -100 brt-output.log >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
          echo "</details>" >> "$GITHUB_STEP_SUMMARY"

      - name: Write job summary on success
        if: success()
        run: |
          echo "## :white_check_mark: Backup Restore Test PASSED" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          grep "RESULT:" brt-output.log >> "$GITHUB_STEP_SUMMARY" || true

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: brt-log-${{ github.run_id }}
          path: brt-output.log
          retention-days: 30
          if-no-files-found: ignore
