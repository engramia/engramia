name: Docker Image

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/engramia/engramia
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image (pre-push scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ghcr.io/engramia/engramia:scan-${{ github.sha }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.repository.updated_at }}
            APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ghcr.io/engramia/engramia:scan-${{ github.sha }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Run Trivy SARIF scan
        if: always()
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ghcr.io/engramia/engramia:scan-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.repository.updated_at }}
            APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to VM
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: ${{ secrets.DEPLOY_PATH }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            export IMAGE_TAG=$(echo "${{ github.ref_name }}" | sed 's/^v//')
            cd ${{ secrets.DEPLOY_PATH }}
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml pull engramia-api
            IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml up -d engramia-api caddy
            IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.prod.yml exec -T engramia-api alembic upgrade head
            docker image prune -f

      - name: Post-deploy smoke test
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            EXPECTED=$(echo "${{ github.ref_name }}" | sed 's/^v//')

            # 1. Version check
            ACTUAL=$(curl -sf https://api.engramia.dev/v1/version | python3 -c "import sys,json; print(json.load(sys.stdin)['app_version'])")
            echo "expected=$EXPECTED  actual=$ACTUAL"
            [ "$EXPECTED" = "$ACTUAL" ] || (echo "POST-DEPLOY VERSION MISMATCH" && exit 1)

            # 2. Deep health check — storage, LLM, and external dependencies
            HEALTH=$(curl -sf -o /dev/null -w "%{http_code}" https://api.engramia.dev/v1/health/deep)
            echo "deep_health_http_status=$HEALTH"
            [ "$HEALTH" = "200" ] || (echo "POST-DEPLOY DEEP HEALTH CHECK FAILED (status=$HEALTH)" && exit 1)

            # 3. Verify no component is in hard error state
            DEEP=$(curl -sf https://api.engramia.dev/v1/health/deep)
            STATUS=$(echo "$DEEP" | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
            echo "deep_health_status=$STATUS"
            [ "$STATUS" != "error" ] || (echo "POST-DEPLOY DEEP HEALTH RETURNED error: $DEEP" && exit 1)
