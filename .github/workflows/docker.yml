name: Docker Image

on:
  release:
    types: [published]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  # ── 1. Build & push image to GHCR ──────────────────────────────────────────
  build-and-push:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/engramia/engramia
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build Docker image (pre-push scan)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ghcr.io/engramia/engramia:scan-${{ github.sha }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.repository.updated_at }}
            APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ghcr.io/engramia/engramia:scan-${{ github.sha }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Run Trivy SARIF scan
        if: always()
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ghcr.io/engramia/engramia:scan-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
        continue-on-error: true

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ github.sha }}
            BUILD_TIME=${{ github.event.repository.updated_at }}
            APP_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 2. Deploy to staging (non-prod server) ─────────────────────────────────
  # Requires repository variable STAGING_ENABLED=true and secrets:
  #   STAGING_DEPLOY_HOST, STAGING_DEPLOY_USER, STAGING_DEPLOY_SSH_KEY,
  #   STAGING_DEPLOY_PATH, STAGING_API_KEY
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: vars.STAGING_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to staging
        uses: appleboy/scp-action@v1.0.0
        with:
          host: ${{ secrets.STAGING_DEPLOY_HOST }}
          username: ${{ secrets.STAGING_DEPLOY_USER }}
          key: ${{ secrets.STAGING_DEPLOY_SSH_KEY }}
          source: "docker-compose.staging.yml,Caddyfile.non-prod"
          target: ${{ secrets.STAGING_DEPLOY_PATH }}

      - name: Deploy staging via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_DEPLOY_HOST }}
          username: ${{ secrets.STAGING_DEPLOY_USER }}
          key: ${{ secrets.STAGING_DEPLOY_SSH_KEY }}
          script: |
            export IMAGE_TAG=$(echo "${{ github.ref_name }}" | sed 's/^v//')
            cd ${{ secrets.STAGING_DEPLOY_PATH }}
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.staging.yml pull engramia-api-staging
            IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.staging.yml up -d pgvector-staging
            IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.staging.yml run --rm -T engramia-api-staging alembic upgrade head
            IMAGE_TAG=$IMAGE_TAG docker compose -f docker-compose.staging.yml up -d engramia-api-staging caddy-staging
            docker image prune -f

  # ── 3. Smoke test staging ───────────────────────────────────────────────────
  smoke-test-staging:
    name: Smoke test staging
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: vars.STAGING_ENABLED == 'true'
    steps:
      - name: Wait for staging to stabilize
        run: sleep 15

      - name: Version check
        run: |
          EXPECTED=$(echo "${{ github.ref_name }}" | sed 's/^v//')
          ACTUAL=$(curl -sf https://staging-api.engramia.dev/v1/version | python3 -c "import sys,json; print(json.load(sys.stdin)['app_version'])")
          echo "expected=$EXPECTED  actual=$ACTUAL"
          [ "$EXPECTED" = "$ACTUAL" ] || (echo "STAGING VERSION MISMATCH" && exit 1)

      - name: Health check
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.STAGING_API_KEY }}" \
            https://staging-api.engramia.dev/v1/health)
          echo "staging_health_status=$STATUS"
          [ "$STATUS" = "200" ] || (echo "STAGING HEALTH CHECK FAILED (status=$STATUS)" && exit 1)

      - name: Deep health check
        run: |
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.STAGING_API_KEY }}" \
            https://staging-api.engramia.dev/v1/health/deep)
          echo "staging_deep_health_status=$STATUS"
          [ "$STATUS" = "200" ] || (echo "STAGING DEEP HEALTH FAILED (status=$STATUS)" && exit 1)
