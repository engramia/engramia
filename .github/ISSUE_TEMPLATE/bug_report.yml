name: Bug Report
description: Report a bug in Engramia
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill in as much detail as possible.

  - type: input
    id: version
    attributes:
      label: Engramia version
      placeholder: "0.5.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true

  - type: dropdown
    id: storage
    attributes:
      label: Storage backend
      options:
        - JSON
        - PostgreSQL
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      render: python
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error / traceback
      render: text
