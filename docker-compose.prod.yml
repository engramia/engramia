services:
  caddy:
    image: caddy:2.9.1-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped
    depends_on:
      - engramia-api

  engramia-api:
    image: ghcr.io/engramia/engramia:${IMAGE_TAG:?IMAGE_TAG must be set}
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    volumes:
      - engramia_data:/data
    restart: unless-stopped
    depends_on:
      pgvector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  pgvector:
    image: pgvector/pgvector:0.7.4-pg16
    environment:
      POSTGRES_USER: engramia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: engramia
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engramia"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  engramia_data:
  caddy_data:
  caddy_config:
  pgdata:
