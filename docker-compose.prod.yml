services:
  engramia-api:
    image: ghcr.io/engramia/engramia:${IMAGE_TAG:-latest}
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    volumes:
      - engramia_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # PostgreSQL + pgvector backend (optional)
  # Uncomment and set ENGRAMIA_STORAGE=postgres in .env.
  # pgvector:
  #   image: pgvector/pgvector:pg16
  #   environment:
  #     POSTGRES_USER: engramia
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #     POSTGRES_DB: engramia
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   restart: unless-stopped
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U engramia"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  engramia_data:
