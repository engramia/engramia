networks:
  engramia-net:
    driver: bridge

services:
  caddy:
    image: caddy:2.9.1-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - engramia-net
    restart: unless-stopped
    depends_on:
      - engramia-api
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M

  dashboard:
    image: engramia/dashboard:latest
    restart: unless-stopped
    environment:
      - NEXTAUTH_URL=${DASHBOARD_URL:-https://app.engramia.dev}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXT_PUBLIC_API_URL=${API_URL:-https://api.engramia.dev}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID:-}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET:-}
      - NEXT_PUBLIC_STRIPE_PRO_URL=${STRIPE_PRO_URL:-}
      - NEXT_PUBLIC_STRIPE_TEAM_URL=${STRIPE_TEAM_URL:-}
    networks:
      - engramia-net
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.1"
          memory: 128M

  engramia-api:
    image: ghcr.io/engramia/engramia:${IMAGE_TAG:?IMAGE_TAG must be set}
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    volumes:
      - engramia_data:/data
    networks:
      - engramia-net
    restart: unless-stopped
    depends_on:
      pgvector:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:mode=1777,size=64m
      - /app/tmp:mode=1777,size=32m
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  pgvector:
    image: pgvector/pgvector:0.7.4-pg16
    environment:
      POSTGRES_USER: engramia
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: engramia
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - engramia-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U engramia"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

volumes:
  engramia_data:
  caddy_data:
  caddy_config:
  pgdata:
