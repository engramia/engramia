services:
  brain-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Storage backend: json (default) or postgres
      BRAIN_STORAGE: ${BRAIN_STORAGE:-json}
      BRAIN_DATA_PATH: /data/brain_data

      # Uncomment for PostgreSQL backend:
      # BRAIN_STORAGE: postgres
      # BRAIN_DATABASE_URL: postgresql://brain:brain@pgvector:5432/brain

      # LLM configuration
      BRAIN_LLM_PROVIDER: ${BRAIN_LLM_PROVIDER:-openai}
      BRAIN_LLM_MODEL: ${BRAIN_LLM_MODEL:-gpt-4.1}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Embedding model
      BRAIN_EMBEDDING_MODEL: ${BRAIN_EMBEDDING_MODEL:-text-embedding-3-small}

      # API authentication (comma-separated keys; empty = dev mode, no auth)
      BRAIN_API_KEYS: ${BRAIN_API_KEYS:-}

      # Security hardening (see docs for production values)
      # CORS — restrict to your frontend origin in production:
      BRAIN_CORS_ORIGINS: ${BRAIN_CORS_ORIGINS:-*}
      # Rate limiting (requests/minute):
      BRAIN_RATE_LIMIT_DEFAULT: ${BRAIN_RATE_LIMIT_DEFAULT:-60}
      BRAIN_RATE_LIMIT_EXPENSIVE: ${BRAIN_RATE_LIMIT_EXPENSIVE:-10}
      # Max request body size in bytes (default: 1 MB):
      BRAIN_MAX_BODY_SIZE: ${BRAIN_MAX_BODY_SIZE:-1048576}
    volumes:
      - brain_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # PostgreSQL + pgvector backend (optional)
  # Uncomment to use PostgreSQL instead of JSON storage.
  # pgvector:
  #   image: pgvector/pgvector:pg16
  #   environment:
  #     POSTGRES_USER: brain
  #     POSTGRES_PASSWORD: brain
  #     POSTGRES_DB: brain
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U brain"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  brain_data:
  # pgdata:  # Uncomment when using PostgreSQL
