services:
  engramia-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Storage backend: json (default) or postgres
      ENGRAMIA_STORAGE: ${ENGRAMIA_STORAGE:-json}
      ENGRAMIA_DATA_PATH: /data/engramia_data

      # Uncomment for PostgreSQL backend:
      # ENGRAMIA_STORAGE: postgres
      # ENGRAMIA_DATABASE_URL: postgresql://engramia:engramia@pgvector:5432/engramia

      # LLM configuration
      ENGRAMIA_LLM_PROVIDER: ${ENGRAMIA_LLM_PROVIDER:-openai}
      ENGRAMIA_LLM_MODEL: ${ENGRAMIA_LLM_MODEL:-gpt-4.1}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Embedding model
      ENGRAMIA_EMBEDDING_MODEL: ${ENGRAMIA_EMBEDDING_MODEL:-text-embedding-3-small}

      # API authentication (comma-separated keys).
      # Empty keys alone return 503 — set ENGRAMIA_ALLOW_NO_AUTH=true for local dev only.
      ENGRAMIA_API_KEYS: ${ENGRAMIA_API_KEYS:-}

      # Security hardening (see docs for production values)
      # CORS — restrict to your frontend origin in production:
      ENGRAMIA_CORS_ORIGINS: ${ENGRAMIA_CORS_ORIGINS:-}
      # Rate limiting (requests/minute):
      ENGRAMIA_RATE_LIMIT_DEFAULT: ${ENGRAMIA_RATE_LIMIT_DEFAULT:-60}
      ENGRAMIA_RATE_LIMIT_EXPENSIVE: ${ENGRAMIA_RATE_LIMIT_EXPENSIVE:-10}
      # Max request body size in bytes (default: 1 MB):
      ENGRAMIA_MAX_BODY_SIZE: ${ENGRAMIA_MAX_BODY_SIZE:-1048576}
    volumes:
      - engramia_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # PostgreSQL + pgvector backend (optional)
  # Uncomment to use PostgreSQL instead of JSON storage.
  # pgvector:
  #   image: pgvector/pgvector:pg16
  #   environment:
  #     POSTGRES_USER: engramia
  #     POSTGRES_PASSWORD: engramia
  #     POSTGRES_DB: engramia
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U engramia"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  engramia_data:
  # pgdata:  # Uncomment when using PostgreSQL
