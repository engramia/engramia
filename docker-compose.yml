services:
  remanence-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Storage backend: json (default) or postgres
      REMANENCE_STORAGE: ${REMANENCE_STORAGE:-json}
      REMANENCE_DATA_PATH: /data/remanence_data

      # Uncomment for PostgreSQL backend:
      # REMANENCE_STORAGE: postgres
      # REMANENCE_DATABASE_URL: postgresql://remanence:remanence@pgvector:5432/remanence

      # LLM configuration
      REMANENCE_LLM_PROVIDER: ${REMANENCE_LLM_PROVIDER:-openai}
      REMANENCE_LLM_MODEL: ${REMANENCE_LLM_MODEL:-gpt-4.1}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Embedding model
      REMANENCE_EMBEDDING_MODEL: ${REMANENCE_EMBEDDING_MODEL:-text-embedding-3-small}

      # API authentication (comma-separated keys; empty = dev mode, no auth)
      REMANENCE_API_KEYS: ${REMANENCE_API_KEYS:-}

      # Security hardening (see docs for production values)
      # CORS — restrict to your frontend origin in production:
      REMANENCE_CORS_ORIGINS: ${REMANENCE_CORS_ORIGINS:-}
      # Rate limiting (requests/minute):
      REMANENCE_RATE_LIMIT_DEFAULT: ${REMANENCE_RATE_LIMIT_DEFAULT:-60}
      REMANENCE_RATE_LIMIT_EXPENSIVE: ${REMANENCE_RATE_LIMIT_EXPENSIVE:-10}
      # Max request body size in bytes (default: 1 MB):
      REMANENCE_MAX_BODY_SIZE: ${REMANENCE_MAX_BODY_SIZE:-1048576}
    volumes:
      - remanence_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # PostgreSQL + pgvector backend (optional)
  # Uncomment to use PostgreSQL instead of JSON storage.
  # pgvector:
  #   image: pgvector/pgvector:pg16
  #   environment:
  #     POSTGRES_USER: remanence
  #     POSTGRES_PASSWORD: remanence
  #     POSTGRES_DB: remanence
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U remanence"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

volumes:
  remanence_data:
  # pgdata:  # Uncomment when using PostgreSQL
